services:
  - type: web
    name: instabot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh start.sh
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: VERIFY_TOKEN
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: DATABASE_URL
        sync: false
